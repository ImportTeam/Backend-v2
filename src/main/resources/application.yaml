spring:
  application:
    name: backend-v2
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5000ms
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

server:
  port: ${SERVER_PORT:8082}

jwt:
  secret: ${JWT_SECRET}
  access-expiration: ${JWT_ACCESS_EXPIRATION:3600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

encryption:
  key: ${ENCRYPTION_KEY}

ext:
  cache:
    ttl: ${CACHE_TTL:21600}
    negative-ttl: ${CACHE_NEGATIVE_TTL:60}
  crawler:
    total-budget-ms: ${CRAWLER_TOTAL_BUDGET_MS:12000}
    cache-timeout-ms: ${CRAWLER_CACHE_TIMEOUT_MS:500}
    fastpath-timeout-ms: ${CRAWLER_FASTPATH_TIMEOUT_MS:8000}
    fail-threshold: ${CRAWLER_FAIL_THRESHOLD:5}
    min-html-length: ${CRAWLER_MIN_HTML_LENGTH:5000}
    user-agent: ${CRAWLER_USER_AGENT:Mozilla/5.0}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

springdoc:
  swagger-ui:
    path: /swagger
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.picsel: DEBUG
    org.hibernate.SQL: DEBUG
